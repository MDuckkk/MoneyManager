services:
  db:
    image: postgres:16-alpine
    container_name: money_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: money
      POSTGRES_PASSWORD: money
      POSTGRES_DB: money_manager
    ports:
      - "5544:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U money -d money_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
